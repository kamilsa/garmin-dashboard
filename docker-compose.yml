services:
  backend:
    build:
      context: .
      dockerfile: dashboard/server/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - garmin_data:/data
    environment:
      - DB_PATH=/data/garmin_data.db
      - MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
      - MAPBOX_TOKEN_FILE=/data/mapbox_token
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  # AI assistant — uncomment or use --profile ai to enable
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles:
      - ai

volumes:
  garmin_data:
  ollama_data:
